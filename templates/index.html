{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2 class="text-center text-white mb-4">Welcome, {{ current_user }}</h2>

<div class="d-flex justify-content-end mb-3">
    <a href="/upload" class="btn btn-primary btn-custom">Upload New File</a>
</div>

<div class="card p-3">
<table class="table table-hover table-dark table-striped">
    <thead>
        <tr>
            <th>File Name</th>
            <th>Password Protected</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for file in files %}
        <tr>
            <td>{{ file['filename'] }}</td>
            <td>{{ 'Yes' if file.password else 'No' }}</td>
            <td>
                <a href="/download/{{ file.file_id }}" class="btn btn-success btn-sm btn-custom">Download</a>
                <a href="/delete/{{ file.file_id }}" class="btn btn-danger btn-sm btn-custom">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
