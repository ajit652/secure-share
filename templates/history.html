{% extends "base.html" %}
{% block title %}History{% endblock %}
{% block content %}
<h2 class="text-center text-white mb-4">Your Activity History</h2>

<div class="card p-3">
<table class="table table-hover table-dark table-striped">
    <thead>
        <tr>
            <th>File Name</th>
            <th>Action</th>
            <th>Timestamp</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log['filename'] }}</td>
            <td>{{ log['action'].capitalize() }}</td>
            <td>{{ log['timestamp'].strftime('%d-%m-%Y %H:%M:%S') }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
