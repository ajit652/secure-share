<!DOCTYPE html>

<html>
<head>

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0d0d0d;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-family:Segoe UI;
}

.login-box{
background:#1c1c1c;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 0 20px rgba(255,0,0,0.4);
}

h3{
color:#ff2e2e;
text-align:center;
margin-bottom:25px;
}

.form-control{
background:#2a2a2a;
border:none;
color:white;
}

.btn-danger{
background:#ff2e2e;
border:none;
}

.btn-danger:hover{
background:#b30000;
}

</style>

</head>

<body>

<div class="login-box">

<h3>ADMIN LOGIN</h3>

<form method="POST">

<input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-danger w-100">Login</button>

</form>

</div>

</body>
</html>
