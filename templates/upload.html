{% extends "base.html" %}
{% block title %}Upload File{% endblock %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width: 500px;">
<h3 class="text-center mb-3">Upload File</h3>
<form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">Select File</label>
        <input type="file" name="file" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Receiver</label>
        <select name="receiver" class="form-select" required>
            {% for user in users %}
            <option value="{{ user['user_id'] }}">{{ user['username'] }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">File Password</label>
        <input type="password" name="filepassword" class="form-control" placeholder="Leave blank for no password">
    </div>
    <button type="submit" class="btn btn-primary btn-custom w-100">Upload</button>
</form>
</div>
{% endblock %}
